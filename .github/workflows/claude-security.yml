name: Claude Security Pass

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'ngsw-config.json'
      - 'package.json'
  workflow_dispatch: {}

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude security pass
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run /security-pass on the diff for Tu-Apo-Web.
            Focus: signature_pad base64 never in querystring, PDF generation no PII in logs, Leaflet tile API keys not hardcoded, IndexedDB PII, SSR data leakage, insecure innerHTML.
